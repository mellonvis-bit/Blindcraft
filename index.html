            ctx.beginPath();
            ctx.arc(fx * W, fy * H * 0.55, 1.3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${pulse})`;
            ctx.fill();
        }
        ctx.restore();

        ctx.save();
        ctx.textAlign = 'center';

        // ── Judul game ──
        ctx.font        = 'bold 34px sans-serif';
        ctx.fillStyle   = '#ffffff';
        ctx.shadowBlur  = 28;
        ctx.shadowColor = 'rgba(70, 170, 255, 0.85)';
        ctx.fillText('BLINDCRAFT', W / 2, H / 2 - 90);
        ctx.shadowBlur  = 0;

        ctx.font      = '12px sans-serif';
        ctx.fillStyle = 'rgba(150, 195, 230, 0.65)';
        ctx.fillText('Game audio aksesibel untuk tunanetra', W / 2, H / 2 - 62);

        // ── Hitung persen aktual dari file yang sudah terunduh ──
        const realPct = Math.min(100, (loadState.loaded / loadState.total) * 100);

        // Animasi display: maju ke target, tidak pernah mundur
        // Kecepatan normal 0.9 per frame, saat semua selesai lebih cepat ke 100
        const speed = loadState.done ? 2.2 : 0.9;
        if (loadDisplayPct < realPct) {
            loadDisplayPct = Math.min(realPct, loadDisplayPct + speed);
        }
        if (loadState.done && loadDisplayPct < 100) {
            loadDisplayPct = Math.min(100, loadDisplayPct + speed);
        }

        // ── Bar loading ──
        const barW = Math.min(W * 0.72, 340);
        const barH = 10;
        const barX = W / 2 - barW / 2;
        const barY = H / 2 - 10;
        const barR = barH / 2;

        // Latar bar
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        _rrect(barX, barY, barW, barH, barR);
        ctx.fill();

        // Isi bar
        const fillW = barW * (loadDisplayPct / 100);
        if (fillW > 1) {
            // Gradient biru → hijau toska
            const fillGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
            fillGrad.addColorStop(0, '#2070cc');
            fillGrad.addColorStop(1, '#38d8a0');
            ctx.fillStyle = fillGrad;
            _rrect(barX, barY, fillW, barH, barR);
            ctx.fill();

            // Shimmer bergerak di atas bar
            const shimPos   = barX + fillW * ((timestamp % 1400) / 1400);
            const shimGrad  = ctx.createLinearGradient(shimPos - 40, 0, shimPos + 40, 0);
            shimGrad.addColorStop(0,   'rgba(255,255,255,0)');
            shimGrad.addColorStop(0.5, 'rgba(255,255,255,0.30)');
            shimGrad.addColorStop(1,   'rgba(255,255,255,0)');
            ctx.fillStyle = shimGrad;
            _rrect(barX, barY, fillW, barH, barR);
            ctx.fill();

            // Titik cahaya di ujung bar
            ctx.beginPath();
            ctx.arc(barX + fillW, barY + barH / 2, barH * 0.80, 0, Math.PI * 2);
            ctx.fillStyle   = '#9cf8de';
            ctx.shadowBlur  = 16;
            ctx.shadowColor = '#38d8a0';
            ctx.fill();
            ctx.shadowBlur  = 0;
        }

        // ── Label persen ──
        const pctInt  = Math.floor(loadDisplayPct);
        ctx.font      = 'bold 15px monospace';
        ctx.fillStyle = '#a8f0e0';
        ctx.fillText(pctInt + '%', W / 2, barY + barH + 26);

        // ── Status teks ──
        ctx.font      = '11px sans-serif';
        ctx.fillStyle = 'rgba(120,150,175,0.80)';
        let statusText;
        if (loadState.done && loadDisplayPct >= 100) {
            statusText = '✓ Semua aset siap — memulai game...';
        } else if (loadState.done) {
            statusText = '✓ Selesai diunduh — menyiapkan game...';
        } else {
            statusText = 'Mengunduh aset audio (' + loadState.loaded + ' / ' + loadState.total + ')...';
        }
        ctx.fillText(statusText, W / 2, barY + barH + 48);

        // ── Versi & kredit ──
        ctx.font      = '10px sans-serif';
        ctx.fillStyle = 'rgba(90,115,140,0.50)';
        ctx.fillText('Mellonvis Creative  •  v2.5', W / 2, H - 18);

        ctx.restore();
    }

    // Loop animasi loading screen (berjalan sampai semua file siap & bar penuh)
    function runLoadingLoop(ts) {
        resize();
        drawLoadingScreen(ts);
        if (loadState.done && loadDisplayPct >= 99.95) {
            // Semua file terunduh dan bar sudah penuh — mulai game
            loadingRafId = null;
            _beginGame();
            return;
        }
        loadingRafId = requestAnimationFrame(runLoadingLoop);
    }

    // Mulai game setelah loading selesai
    function _beginGame() {
        if (gameStarted) return; // guard: jangan mulai dua kali
        gameStarted  = true;
        dayStartTime = performance.now();
        startGameBGM();
        requestAnimationFrame(draw);
    }

    // ─── MENU UTAMA (native prompt/alert — TalkBack friendly) ─────
    const MENU_INFO = {
        2: 'Profil: Blindcraft oleh Mellonvis Creative. Game aksesibel berbasis audio 3D spatial untuk pemain tunanetra.',
        3: 'Pengaturan: Fitur pengaturan akan tersedia di versi mendatang.',
        4: 'Tutorial: Sentuh zona atas layar lalu seret untuk mengarahkan tangan dan menyerang. Sentuh zona bawah layar untuk menggerakkan karakter dengan joystick virtual. Pukul ayam 3 kali untuk mengalahkannya!',
        5: 'Riset permainan: Game ini menggunakan audio 3D spatial (Web Audio API HRTF) agar pemain tunanetra dapat mendeteksi posisi musuh hanya dari suara. Setiap objek memiliki suara yang mengikuti posisinya di dunia game.',
    };

    let gameStarted = false;

    function showMenu() {
        const choice = prompt(
            'Blindcraft\nGame audio aksesibel untuk tunanetra\n\n' +
            '1. Main\n' +
            '2. Profil\n' +
            '3. Pengaturan\n' +
            '4. Tutorial\n' +
            '5. Riset permainan\n\n' +
            'Ketik angka 1 sampai 5 lalu tekan OK:'
        );

        if (choice === null) {
            const kembali = confirm('Tekan OK untuk kembali ke menu, atau Batal untuk keluar.');
            if (kembali) showMenu();
            return;
        }

        const n = parseInt(choice.trim());
        if (isNaN(n) || n < 1 || n > 5) {
            alert('Pilihan tidak valid. Masukkan angka 1 sampai 5.');
            showMenu();
            return;
        }

        if (n === 1) {
            alert(
                'PERINGATAN SEBELUM BERMAIN\n\n' +
                'Harap matikan TalkBack (Screen Reader) terlebih dahulu sebelum bermain.\n\n' +
                'Cara mematikan TalkBack:\n' +
                'Pengaturan > Aksesibilitas > TalkBack > Matikan\n\n' +
                'Game ini menggunakan kontrol sentuh khusus yang tidak kompatibel dengan TalkBack.\n\n' +
                'Tekan OK jika sudah siap bermain.'
            );

            stopBacksound();

            // Unlock AudioContext — masih dalam konteks interaksi pengguna (setelah alert)
            if (!audioUnlocked) {
                audioUnlocked = true;
                try { getAudioCtx().resume(); } catch(e) {}
            }

            // Mulai loading screen (hanya sekali)
            if (!gameStarted && !loadState.active) {
                loadState.active  = true;
                loadDisplayPct    = 0;
                loadState.loaded  = 0;
                loadState.done    = false;
                // Mulai animasi loading screen
                loadingRafId = requestAnimationFrame(runLoadingLoop);
                // Mulai unduh semua file audio secara paralel (tidak await di sini)
                preloadAudioWithProgress();
            }
        } else {
            alert(MENU_INFO[n]);
            showMenu();
        }
    }

    // Tampilkan menu saat halaman siap
    setTimeout(() => showMenu(), 150);
</script>
